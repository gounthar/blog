baseURL = "https://bruno.verachten.fr"
languageCode = "en"
title = "Bruno Verachten"
theme = "ascii-press"
summaryLength = 30
timeZone = "Europe/Paris"
enableRobotsTXT = true
enableEmoji = true

# Google Analytics (legacy UA — migrate to GA4 when ready)
[services.googleAnalytics]
  ID = "UA-46278016-1"

[permalinks]
  [permalinks.page]
    posts = "/:year/:month/:day/:title/"

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[pagination]
  pagerSize = 6
  path = "page"

# AsciiDoc rendering via external asciidoctor binary
[markup.asciidocExt]
  backend = "html5"
  extensions = []
  failureLevel = "fatal"
  noHeaderOrFooter = true
  preserveTOC = true
  safeMode = "unsafe"
  sectionNumbers = false
  trace = false
  verbose = false
  workingFolderCurrent = true
  [markup.asciidocExt.attributes]
    "source-highlighter" = "highlightjs"
    "icons" = "font"
    "sectanchors" = ""
    "experimental" = ""

# Disable Hugo built-in code highlighting (ascii-press uses highlight.js)
[markup.highlight]
  codeFences = false

[markup.goldmark.renderer]
  unsafe = true

[params]
  description = "Articles regarding my daily work and my tinkering at home"
  author = "Bruno Verachten"
  authorEmail = "bruno@verachten.fr"
  authorimage = "/images/logo.png"
  dateformat = "2006-01-02"

  # highlight.js
  highlightjs = true
  highlightjsstyle = "a11y-light"
  highlightjsdarkstyle = "gruvbox-dark"

  # Table of contents
  toc = "tocbot"

  mainSections = ["posts"]
  landingLastPosts = 100

  # sidebar
  copyright = "Bruno Verachten"
  since = 2015
  showBuiltWith = false

[params.social]
  github = "gounthar"
  linkedin = "bruno-verachten-2096449a"
  twitter = "poddingue"
  gravatar = "bruno@verachten.fr"
  mastodon = "https://mastodon.social/@poddingue"
  youtube = "UCyrSW5yzz1gAHzN567cE2YA"

# RSS feed at /feed.xml to match Jekyll
[outputFormats.RSS]
  mediaType = "application/rss+xml"
  baseName = "feed"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[sitemap]
  changeFreq = ""
  filename = "sitemap.xml"
  priority = -1

# Ignore files
[build]
  [build.buildStats]
    enable = false

ignoreFiles = ["CLAUDE\\.md$", "CONTEXT\\.md$", "\\.env$"]

# Security: allow asciidoctor binary
[security]
  [security.exec]
    allow = ['^(dart-)?sass(-embedded)?$', '^go$', '^git$', '^npx$', '^postcss$', '^tailwindcss$', '^asciidoctor$']
    osEnv = ['(?i)^((HTTPS?|NO)_PROXY|PATH(EXT)?|APPDATA|TE?MP|TERM|GO\w+|(XDG_CONFIG_)?HOME|USERPROFILE|SSH_AUTH_SOCK|DISPLAY|LANG|SYSTEMDRIVE|PROGRAMDATA|GEM_PATH|GEM_HOME|RUBY\w+)$']

[menu]
  [[menu.main]]
    pre = "<span class='fa-icon'><i class='fas fa-home'></i></span><code>cd <em>~</em></code>"
    url = "/"
    weight = -100

  [[menu.main]]
    identifier = "post"
    title = "All posts"
    pre = "<span class='fa-icon'><i class='fas fa-stream'></i></span><code>ls <em>posts/*</em></code>"
    url = "/posts/"
    weight = 1

  [[menu.main]]
    identifier = "tags"
    pre = "<span class='fa-icon'><i class='fas fa-tags'></i></span><code>grep -o <em>tags</em> posts/* | sort -u</code>"
    title = "All tags"
    url = "/tags/"
    weight = 2

  [[menu.main]]
    identifier = "categories"
    pre = "<span class='fa-icon'><i class='fas fa-folder'></i></span><code>ls <em>categories/</em></code>"
    title = "All categories"
    url = "/categories/"
    weight = 3

  [[menu.meta]]
    identifier = "categories"
    name = "Categories"
    weight = 1
  [[menu.meta]]
    identifier = "tags"
    name = "Tags"
    weight = 2
