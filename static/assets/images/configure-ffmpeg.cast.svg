        <rect class="background" height="100%" width="100%" x="0" y="0"/><defs><g id="g15"><text class="foreground" textLength="536" x="0">bfdk-aac --enable-libbluray --extra-libs='-lnettle -lhogweed -lgmp'</text></g><g id="g22"><text class="foreground" textLength="144" x="0">solve the problem.</text></g><g id="g1"><text class="color10" font-weight="bold" textLength="296" x="0">linaro@captation-techforum-rk3399-4GB</text><text class="foreground" textLength="8" x="296">:</text><text class="color12" font-weight="bold" textLength="184" x="304">~/ffmpeg_sources/FFmpeg</text><text class="foreground" textLength="16" x="488">$ </text><text class="background" textLength="8" x="504"> </text></g><g id="g19"><text class="foreground" textLength="584" x="0">version from Git.  If the latest version fails, report the problem to the</text></g><g id="g14"><text class="foreground" textLength="536" x="0">bfdk-aac --enable-libbluray --extra-libs='-lnettle -lhogweed -lgmp'</text><text class="background" textLength="8" x="536"> </text></g><g id="g9"><text class="foreground" textLength="880" x="0">--enable-libspeex  --enable-libssh --enable-libtesseract --enable-libtheora  --enable-libtwolame --enable-libv</text></g><g id="g17"><text class="color9" font-weight="bold" textLength="368" x="0">ERROR: aom &gt;= 1.0.0 not found using pkg-config</text></g><g id="g6"><text class="foreground" textLength="880" x="0">--enable-libjack  --enable-libmodplug --enable-libmp3lame --enable-libopencore-amrnb  --enable-libopencore-amr</text></g><g id="g5"><text class="foreground" textLength="880" x="0">le-libcodec2 --enable-libfontconfig --enable-libfreetype  --enable-libfribidi --enable-libgme --enable-libgsm </text></g><g id="g2"><text class="color10" font-weight="bold" textLength="296" x="0">linaro@captation-techforum-rk3399-4GB</text><text class="foreground" textLength="8" x="296">:</text><text class="color12" font-weight="bold" textLength="184" x="304">~/ffmpeg_sources/FFmpeg</text><text class="foreground" textLength="392" x="488">$ ./configure --enable-gpl --enable-version3 --di</text></g><g id="g21"><text class="foreground" textLength="648" x="0">Include the log file "ffbuild/config.log" produced by configure as this will help</text></g><g id="g20"><text class="foreground" textLength="568" x="0">ffmpeg-user@ffmpeg.org mailing list or IRC #ffmpeg on irc.freenode.net.</text></g><g id="g13"><text class="foreground" textLength="880" x="0">nable-libmysofa  --enable-openal --enable-opencl --enable-opengl --enable-libdrm  --enable-nonfree --enable-li</text></g><g id="g4"><text class="foreground" textLength="880" x="0">gmp --enable-gnutls --enable-ladspa  --enable-libaom --enable-libass --enable-libcaca --enable-libcdio  --enab</text></g><g id="g23"><text class="color10" font-weight="bold" textLength="296" x="0">linaro@captation-techforum-rk3399-4GB</text><text class="foreground" textLength="8" x="296">:</text><text class="color12" font-weight="bold" textLength="184" x="304">~/ffmpeg_sources/FFmpeg</text><text class="foreground" textLength="48" x="488">$ exit</text></g><g id="g10"><text class="foreground" textLength="880" x="0">4l2 --enable-libvo-amrwbenc  --enable-libvorbis --enable-libvpx --enable-libwavpack --enable-libwebp  --enable</text></g><g id="g8"><text class="foreground" textLength="880" x="0">enable-librsvg --enable-librubberband --enable-librtmp --enable-libshine  --enable-libsnappy --enable-libsoxr </text></g><g id="g3"><text class="foreground" textLength="880" x="0">sable-static  --enable-shared --enable-small --enable-avisynth --enable-chromaprint  --enable-frei0r --enable-</text></g><g id="g7"><text class="foreground" textLength="880" x="0">wb --enable-libopencore-amrwb  --enable-libopenjpeg --enable-libopenmpt --enable-libopus --enable-libpulse  --</text></g><g id="g12"><text class="foreground" textLength="880" x="0">-libx264 --enable-libx265 --enable-libxvid --enable-libxml2  --enable-libzmq --enable-libzvbi --enable-lv2 --e</text></g><g id="g11"><tex