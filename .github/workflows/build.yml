name: Build and Deploy Hugo Site

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      site: ${{ steps.filter.outputs.site }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect site-affecting changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            site:
              - 'content/**'
              - 'static/**'
              - 'layouts/**'
              - 'data/**'
              - 'archetypes/**'
              - 'hugo.toml'
              - 'go.mod'
              - 'go.sum'
              - 'themes/**'
              - 'assets/**'
              - 'config/**'

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Setup Ruby and Asciidoctor
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Asciidoctor
        run: gem install asciidoctor rouge --no-document

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: public
          path: public/
          retention-days: 7

  deploy:
    needs: [changes, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.site == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: public
          path: public/

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: public/
          server-dir: ${{ secrets.DESTINATION_FOLDER }}/
          dangerous-clean-slate: true
